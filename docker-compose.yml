services:
  humanit-api:
    build: ./backend
    container_name: humanit-api
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: file:/data/app.db
      UPLOAD_DIR: /data/uploads
      FRONTEND_ORIGIN: http://localhost:8080
      SESSION_SECRET: ${SESSION_SECRET:-please-change-session-secret}
      SEED_EMAIL: ${SEED_EMAIL:-admin@example.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
    volumes:
      - api_sqlite:/data
    ports:
      - "4000:4000"

  humanit-app:
    build: ./frontend
    container_name: humanit-app
    ports:
      - "8080:80"
    depends_on:
      - humanit-api

volumes:
  api_sqlite:
